<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Markdown Client</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="./node_modules/highlight.js/styles/github.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-brand">
          <div class="brand-mark" aria-hidden="true">
            <span>✦</span>
          </div>
          <div class="brand-copy">
            <p class="brand-eyebrow">Workspace</p>
            <h1>AI Notes Studio</h1>
          </div>
        </div>
        <div class="topbar-actions">
          <div class="topbar-action-group">
            <button id="themeToggle" class="icon-button" type="button" title="切换深浅色" aria-label="切换深浅色">
              <span class="theme-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                  <path
                    d="M9.37 5.51A7 7 0 0 0 18.49 14.63A9 9 0 1 1 9.37 5.51Z"
                    fill="currentColor"
                  />
                </svg>
              </span>
            </button>
            <div class="topbar-popover-shell">
              <button
                id="backgroundToggle"
                class="icon-button"
                type="button"
                title="编辑区背景"
                aria-label="编辑区背景"
                aria-haspopup="dialog"
                aria-expanded="false"
              >
                <span class="background-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                    <path
                      d="M5.75 4.5h12.5A1.75 1.75 0 0 1 20 6.25v11.5a1.75 1.75 0 0 1-1.75 1.75H5.75A1.75 1.75 0 0 1 4 17.75V6.25A1.75 1.75 0 0 1 5.75 4.5Zm0 1.5a.25.25 0 0 0-.25.25v1.8h13v-1.8a.25.25 0 0 0-.25-.25H5.75Zm-.25 3.55v8.2c0 .14.11.25.25.25h12.5c.14 0 .25-.11.25-.25v-8.2h-13Z"
                      fill="currentColor"
                    />
                    <path d="M8 11.25h8M8 14.25h8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
                  </svg>
                </span>
              </button>
              <div id="backgroundPanel" class="topbar-popover" hidden>
                <p class="topbar-popover-title">编辑区背景</p>
                <div class="background-options" role="list">
                  <button type="button" class="background-option" data-editor-bg="default">
                    <span class="background-swatch background-swatch-default" aria-hidden="true"></span>
                    <span class="background-option-copy">
                      <strong>默认</strong>
                      <small>干净浅色面板</small>
                    </span>
                  </button>
                  <button type="button" class="background-option" data-editor-bg="eye-care">
                    <span class="background-swatch background-swatch-eye-care" aria-hidden="true"></span>
                    <span class="background-option-copy">
                      <strong>护眼</strong>
                      <small>偏柔和的浅绿色纸面</small>
                    </span>
                  </button>
                  <button type="button" class="background-option" data-editor-bg="paper">
                    <span class="background-swatch background-swatch-paper" aria-hidden="true"></span>
                    <span class="background-option-copy">
                      <strong>稿纸</strong>
                      <small>带轻微横线和边距参考</small>
                    </span>
                  </button>
                </div>
              </div>
            </div>
          </div>
          <div class="topbar-action-group topbar-action-group-strong">
            <button id="settingsToggle" class="icon-button" type="button" title="API 设置" aria-label="API 设置">
              <span aria-hidden="true">⚙️</span>
            </button>
            <button id="clearButton" class="icon-button danger" type="button" title="清空文档" aria-label="清空文档">
              <span aria-hidden="true">🗑️</span>
            </button>
          </div>
        </div>
      </header>

      <main class="workspace">
        <aside id="documentsSidebar" class="documents-sidebar" aria-label="文档列表">
          <div class="documents-sidebar-header">
            <div class="documents-sidebar-copy">
              <p class="sidebar-eyebrow">Documents</p>
              <h2>文档记录</h2>
              <p class="documents-sidebar-lead">聚合文档、AI 续写与图形渲染结果。</p>
            </div>
            <div class="documents-actions">
              <button id="newDocumentButton" class="icon-button" type="button" title="新建文档" aria-label="新建文档">
                <span aria-hidden="true">＋</span>
              </button>
            </div>
          </div>
          <div id="documentsList" class="documents-list" role="list"></div>
          <div class="documents-sidebar-footer">
            <p class="documents-path-label">本地工作区</p>
            <code id="documentsPath" class="documents-path"></code>
          </div>
        </aside>
        <button
          id="sidebarRailToggle"
          class="sidebar-rail-toggle"
          type="button"
          title="收起侧栏"
          aria-label="收起侧栏"
          aria-pressed="false"
        >
          <span class="sidebar-rail-track" aria-hidden="true"></span>
          <span class="sidebar-rail-knob" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path
                d="M9.5 6.75 14.75 12 9.5 17.25"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
        </button>
        <section
          id="documentView"
          class="document-view"
          aria-label="Markdown 编辑区"
          contenteditable="true"
          spellcheck="false"
        ></section>
        <div id="inlinePrompt" class="inline-prompt" hidden>
          <div class="inline-prompt-inner">
            <textarea
              id="promptInput"
              rows="1"
              placeholder="向 AI 提问，Enter 发送，多行快捷键自动适配"
            ></textarea>
            <div id="promptStatusLabel" class="prompt-status-label" hidden>AI 正在回复中</div>
            <div class="composer-actions composer-actions-inline">
              <span id="statusText" class="status-text status-text-hidden" aria-live="polite" hidden>就绪。</span>
              <div class="composer-buttons">
                <div id="inlineModelPicker" class="inline-model-picker">
                  <button
                    id="inlineModelTrigger"
                    class="inline-model-trigger"
                    type="button"
                    aria-label="当前模型"
                    aria-haspopup="listbox"
                    aria-controls="inlineModelPanel"
                    aria-expanded="false"
                  >
                    <span id="inlineModelLabel" class="inline-model-label">未配置模型</span>
                    <span class="inline-model-chevron" aria-hidden="true"></span>
                  </button>
                  <div id="inlineModelPanel" class="inline-model-panel" hidden>
                    <div id="inlineModelList" class="inline-model-list" role="listbox" aria-label="模型列表"></div>
                  </div>
                </div>
                <button
                  id="actionButton"
                  class="action-button action-idle"
                  type="button"
                  disabled
                  title="发送"
                  aria-label="发送"
                >
                  <span class="action-icon action-icon-send" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                      <path
                        d="M20.64 3.36a1.2 1.2 0 0 0-1.23-.27L4.76 8.27a1.2 1.2 0 0 0 .08 2.28l6.08 1.82 1.83 6.08a1.2 1.2 0 0 0 2.27.07l5.89-14.67a1.2 1.2 0 0 0-.27-1.23Zm-7.01 13.1-1.23-4.07a1.2 1.2 0 0 0-.81-.8L7.53 10.36l10.25-3.68-4.15 9.78Z"
                        fill="currentColor"
                      />
                    </svg>
                  </span>
                  <span class="action-icon action-icon-stop" aria-hidden="true">●</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div id="settingsModal" class="modal-backdrop" hidden>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <header class="modal-header">
          <div>
            <p class="eyebrow">Configuration</p>
            <h2 id="settingsTitle">配置中心</h2>
          </div>
          <button id="settingsClose" class="ghost-button" type="button">关闭</button>
        </header>

        <div class="settings-layout">
          <aside class="profiles-panel" aria-label="配置列表">
            <div class="profiles-panel-header">
              <div>
                <p class="sidebar-eyebrow">Providers</p>
                <h3>提供商</h3>
              </div>
              <button id="addProfileButton" class="icon-button" type="button" title="新增提供商" aria-label="新增提供商">
                <span aria-hidden="true">＋</span>
              </button>
            </div>
            <div id="profilesList" class="profiles-list" role="list"></div>
          </aside>

          <section class="settings-form-panel">
            <div class="settings-form-header">
              <div>
                <p class="sidebar-eyebrow">Provider Editor</p>
                <h3 id="profileFormTitle">编辑提供商</h3>
              </div>
              <button id="deleteProfileButton" class="ghost-button danger" type="button">删除提供商</button>
            </div>

            <div class="settings-grid">
              <label class="field">
                <span>提供商名称</span>
                <input id="profileName" type="text" placeholder="例如：OpenRouter / NVIDIA" />
              </label>
              <label class="field">
                <span>默认模型</span>
                <input id="model" type="text" placeholder="stepfun-ai/step-3.5-flash" />
              </label>
              <label class="field field-wide">
                <span>模型列表</span>
                <textarea id="modelOptions" rows="4" placeholder="同一个提供商的多个模型都写在这里，每行一个"></textarea>
              </label>
              <label class="field">
                <span>API URL</span>
                <input id="apiUrl" type="text" placeholder="https://.../v1 或 /chat/completions" />
              </label>
              <label class="field">
                <span>代理地址</span>
                <input id="proxyUrl" type="text" placeholder="http://127.0.0.1:7890" />
              </label>
              <label class="field field-wide">
                <span>API Key</span>
                <div class="input-with-action">
                  <input id="apiKey" type="password" placeholder="sk-..." />
                  <button
                    id="toggleApiKeyVisibility"
                    class="input-action-button"
                    type="button"
                    title="显示 API Key"
                    aria-label="显示 API Key"
                    aria-pressed="false"
                  >
                    <span class="input-action-icon input-action-icon-show" aria-hidden="true">
                      <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                        <path
                          d="M2.75 12s3.35-5.75 9.25-5.75S21.25 12 21.25 12 17.9 17.75 12 17.75 2.75 12 2.75 12Z"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="1.6"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        />
                        <circle cx="12" cy="12" r="2.9" fill="none" stroke="currentColor" stroke-width="1.6" />
                      </svg>
                    </span>
                    <span class="input-action-icon input-action-icon-hide" aria-hidden="true">
                      <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                        <path
                          d="M3.75 4.75 20.25 19.25"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="1.8"
                          stroke-linecap="round"
                        />
                        <path
                          d="M10.58 6.43A9.72 9.72 0 0 1 12 6.25c5.9 0 9.25 5.75 9.25 5.75a17.3 17.3 0 0 1-3.34 3.83M6.88 8.38C4.25 10.03 2.75 12 2.75 12S6.1 17.75 12 17.75c1.5 0 2.83-.37 4-.95"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="1.6"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        />
                        <path
                          d="M9.9 9.63A3 3 0 0 0 14.38 14.1"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="1.6"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        />
                      </svg>
                    </span>
                  </button>
                </div>
              </label>
              <label class="field">
                <span>Temperature</span>
                <input id="temperature" type="number" min="0" max="2" step="0.1" />
              </label>
              <label class="field">
                <span>最大 Tokens</span>
                <input id="maxTokens" type="number" min="256" max="65536" step="1" />
              </label>
              <label class="field field-wide">
                <span>系统提示词</span>
                <textarea id="systemPrompt" rows="4" placeholder="可选：为 AI 补充系统提示"></textarea>
              </label>
            </div>

            <div class="settings-footer">
              <label class="checkbox-field">
                <input id="ignoreTlsErrors" type="checkbox" />
                <span>忽略 TLS 证书错误</span>
              </label>
              <button id="saveSettings" class="primary-button" type="button">保存全部配置</button>
            </div>
          </section>
        </div>
        <p class="config-path">配置文件：<code id="configPath"></code></p>
      </section>
    </div>

    <div id="diagramPreviewModal" class="modal-backdrop diagram-preview-backdrop" hidden>
      <section class="diagram-preview-panel" role="dialog" aria-modal="true" aria-labelledby="diagramPreviewTitle">
        <header class="diagram-preview-header">
          <h2 id="diagramPreviewTitle">渲染预览</h2>
          <button id="diagramPreviewClose" class="ghost-button" type="button">关闭</button>
        </header>
        <div id="diagramPreviewContent" class="diagram-preview-content"></div>
      </section>
    </div>

    <script src="./node_modules/markdown-it/dist/markdown-it.min.js"></script>
    <script src="./node_modules/dompurify/dist/purify.min.js"></script>
    <script src="./node_modules/mermaid/dist/mermaid.min.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
