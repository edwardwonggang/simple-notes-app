<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WPS 输入调试</title>
  <link rel="stylesheet" href="./debug-taskpane.css">
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div>
        <h1>输入/粘贴调试</h1>
        <p>专门排查 Mac WPS 内嵌输入框的复制、粘贴、组合键和卡顿问题。</p>
      </div>
      <div class="meta">
        <span id="platformBadge" class="badge">平台检测中…</span>
        <span id="hostBadge" class="badge">宿主检测中…</span>
      </div>
    </header>

    <section class="card">
      <div class="row">
        <label class="field compact">
          <span>事件策略</span>
          <select id="strategySelect">
            <option value="native">原生透传</option>
            <option value="stop-propagation">keydown stopPropagation</option>
            <option value="stop-immediate">keydown stopImmediatePropagation</option>
          </select>
        </label>
        <label class="field compact">
          <span>日志上限</span>
          <select id="logLimitSelect">
            <option value="200">200</option>
            <option value="500" selected>500</option>
            <option value="1000">1000</option>
          </select>
        </label>
      </div>
      <p id="strategyHint" class="hint">当前使用原生透传，不主动拦截复制/粘贴组合键。</p>
    </section>

    <section class="card fields">
      <label class="field">
        <span>API URL 测试框</span>
        <input id="probeUrl" type="text" autocomplete="off" spellcheck="false" placeholder="在这里测试 Cmd/Ctrl + V、右键粘贴、剪切、全选">
      </label>
      <label class="field">
        <span>API Key 测试框</span>
        <input id="probeApiKey" type="text" autocomplete="off" spellcheck="false" placeholder="模拟 API Key 输入框">
      </label>
      <label class="field">
        <span>多行文本框</span>
        <textarea id="probeTextarea" rows="4" placeholder="在这里测试长文本粘贴、Shift+Enter、输入法"></textarea>
      </label>
      <label class="field">
        <span>可编辑区域</span>
        <div id="probeEditable" class="editable" contenteditable="true" role="textbox" aria-multiline="true"></div>
      </label>
    </section>

    <section class="card actions">
      <button id="clearLogsBtn" class="ghost" type="button">清空日志</button>
      <button id="copyLogsBtn" class="ghost" type="button">复制日志</button>
      <button id="markBtn" class="primary" type="button">插入标记</button>
      <span id="statusText" class="status">等待操作…</span>
    </section>

    <section class="card log-card">
      <div class="log-header">
        <h2>事件日志</h2>
        <p>如果右键粘贴后卡住，恢复后先复制这里的日志给我。</p>
      </div>
      <pre id="logOutput" class="log-output"></pre>
    </section>
  </div>

  <script src="../js/core/runtime.js"></script>
  <script src="../js/core/constants.js"></script>
  <script src="../js/core/storage.js"></script>
  <script src="../js/core/host.js"></script>
  <script src="../js/debug/index.js"></script>
</body>
</html>
