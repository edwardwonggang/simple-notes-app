<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WPS AI 助手</title>
  <link rel="stylesheet" href="./taskpane.css">
</head>
<body>
  <div class="shell">
    <header class="header">
      <div>
        <h1>AI 对话</h1>
        <p id="selectionHint">未读取选区，可直接提问</p>
      </div>
    </header>

    <section class="selection-card">
      <p id="selectionMeta">当前没有选区上下文</p>
    </section>

    <main class="composer">
      <textarea id="promptInput" placeholder="输入问题，Enter 发送，Shift+Enter 换行"></textarea>
      <div class="footer">
        <span id="statusText">正在连接本地 AI…</span>
        <div class="actions">
          <button id="stopBtn" class="ghost hidden" type="button">停止</button>
          <button id="sendBtn" class="primary" type="button">发送</button>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/core/runtime.js"></script>
  <script src="../js/core/constants.js"></script>
  <script src="../js/core/storage.js"></script>
  <script src="../js/core/host.js"></script>
  <script src="../js/core/bridge.js"></script>
  <script src="../js/render/markdown.js"></script>
  <script src="../js/render/wps.js"></script>
  <script src="../js/taskpane/state.js"></script>
  <script src="../js/taskpane/ui.js"></script>
  <script src="../js/taskpane/ai-client.js"></script>
  <script src="../js/taskpane/controller.js"></script>
  <script src="../js/taskpane/index.js"></script>
</body>
</html>
